apiVersion: v1
kind: Secret
metadata:
  name: {{ include "homelab-game.fullname" . }}-secret
  labels:
    {{- include "homelab-game.labels" . | nindent 4 }}
type: Opaque
data:
  DB_PASSWORD: {{ .Values.secrets.dbPassword | b64enc | quote }}
  JWT_SECRET: {{ .Values.secrets.jwtSecret | b64enc | quote }}
