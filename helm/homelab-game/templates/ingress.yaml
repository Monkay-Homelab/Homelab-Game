{{- if .Values.ingress.enabled }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "homelab-game.fullname" . }}
  labels:
    {{- include "homelab-game.labels" . | nindent 4 }}
spec:
  {{- if .Values.ingress.className }}
  ingressClassName: {{ .Values.ingress.className }}
  {{- end }}
  {{- if .Values.ingress.tls }}
  tls:
    {{- toYaml .Values.ingress.tls | nindent 4 }}
  {{- end }}
  rules:
    # API backend
    - host: {{ .Values.ingress.apiHost }}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: {{ include "homelab-game.fullname" . }}-backend
                port:
                  number: {{ .Values.backend.port }}
    # Game frontend
    - host: {{ .Values.ingress.gameHost }}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: {{ include "homelab-game.fullname" . }}-frontend
                port:
                  number: {{ .Values.frontend.port }}
{{- end }}
