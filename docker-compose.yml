# Plain Docker Compose deployment (not Swarm). For Swarm use docker-stack.yml.
# Setup: cp .env.example .env  (then fill in DB_PASSWORD and JWT_SECRET)
# Launch: docker compose up -d
# External nginx terminates TLS and proxies api.homelab.living -> :8085, game.homelab.living -> :8086

services:
  migrations:
    image: ghcr.io/monkay-homelab/homelab-game-migrations:latest
    environment:
      DB_HOST: db
      DB_PORT: "5432"
      DB_USER: homelab_game
      DB_PASSWORD: ${DB_PASSWORD}
      DB_NAME: homelab_game
    networks:
      - backend
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "test", "-f", "/tmp/migrations-done"]
      interval: 10s
      timeout: 3s
      start_period: 60s
      retries: 5
    restart: unless-stopped

  backend:
    image: ghcr.io/monkay-homelab/homelab-game-backend:latest
    environment:
      PORT: "8085"
      ENV: production
      DB_HOST: db
      DB_PORT: "5432"
      DB_USER: homelab_game
      DB_PASSWORD: ${DB_PASSWORD}
      DB_NAME: homelab_game
      DB_SSLMODE: disable
      JWT_SECRET: ${JWT_SECRET}
      REDIS_ADDR: redis:6379
      CORS_ORIGINS: ${CORS_ORIGINS:-}
    ports:
      - "8085:8085"
    networks:
      - backend
      - frontend
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrations:
        condition: service_healthy
    restart: unless-stopped

  frontend:
    image: ghcr.io/monkay-homelab/homelab-game-frontend:latest
    environment:
      API_URL: ${API_URL:-}
    ports:
      - "8086:80"
    networks:
      - frontend
    depends_on:
      - backend
    restart: unless-stopped

  db:
    image: timescale/timescaledb:latest-pg16
    environment:
      POSTGRES_DB: homelab_game
      POSTGRES_USER: homelab_game
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - backend
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U homelab_game -d homelab_game"]
      interval: 10s
      timeout: 3s
      start_period: 30s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    command: >
      redis-server
      --maxmemory 128mb
      --maxmemory-policy allkeys-lru
      --save ""
      --appendonly no
    networks:
      - backend
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      start_period: 5s
      retries: 3
    restart: unless-stopped

networks:
  backend:
  frontend:

volumes:
  pgdata:
