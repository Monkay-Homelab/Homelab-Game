version: "3.8"

services:
  # ---- Traefik Ingress ----
  traefik:
    image: traefik:v3.6
    command:
      - "--providers.swarm=true"
      - "--providers.swarm.exposedByDefault=false"
      - "--entrypoints.web.address=:80"
      - "--entrypoints.websecure.address=:443"
      - "--ping=true"
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      - frontend
    deploy:
      replicas: 1
      placement:
        constraints:
          - node.role == manager
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 5

  # ---- Database migrations (run-once) ----
  migrations:
    image: ghcr.io/monkay-homelab/homelab-game-migrations:latest
    environment:
      DB_HOST: db
      DB_PORT: "5432"
      DB_USER: homelab_game
      DB_PASSWORD: ${DB_PASSWORD}
      DB_NAME: homelab_game
    networks:
      - backend
    deploy:
      restart_policy:
        condition: on-failure
        max_attempts: 3
      replicas: 1

  # ---- Backend API ----
  backend:
    image: ghcr.io/monkay-homelab/homelab-game-backend:latest
    environment:
      PORT: "8080"
      ENV: production
      DB_HOST: db
      DB_PORT: "5432"
      DB_USER: homelab_game
      DB_PASSWORD: ${DB_PASSWORD}
      DB_NAME: homelab_game
      DB_SSLMODE: disable
      JWT_SECRET: ${JWT_SECRET}
      REDIS_ADDR: "redis:6379"
    networks:
      - backend
      - frontend
    deploy:
      replicas: 2
      update_config:
        parallelism: 1
        delay: 10s
        order: start-first
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 5
      labels:
        - "traefik.enable=true"
        - "traefik.http.routers.backend.rule=Host(`api.homelab.living`)"
        - "traefik.http.routers.backend.entrypoints=websecure"
        - "traefik.http.services.backend.loadbalancer.server.port=8080"
        - "traefik.http.services.backend.loadbalancer.sticky.cookie=true"
        - "traefik.http.services.backend.loadbalancer.sticky.cookie.name=_backend_affinity"
        - "traefik.http.services.backend.loadbalancer.sticky.cookie.httponly=true"
        - "traefik.http.services.backend.loadbalancer.sticky.cookie.secure=true"
        - "traefik.http.services.backend.loadbalancer.sticky.cookie.samesite=strict"
        - "traefik.http.services.backend.loadbalancer.healthcheck.path=/health"
        - "traefik.http.services.backend.loadbalancer.healthcheck.interval=5s"
        - "traefik.http.services.backend.loadbalancer.healthcheck.timeout=3s"
    healthcheck:
      test: ["CMD", "/healthcheck"]
      interval: 10s
      timeout: 3s
      start_period: 10s
      retries: 3

  # ---- Frontend (nginx) ----
  frontend:
    image: ghcr.io/monkay-homelab/homelab-game-frontend:latest
    networks:
      - frontend
    deploy:
      replicas: 1
      update_config:
        parallelism: 1
        delay: 10s
        order: start-first
      restart_policy:
        condition: any
        delay: 5s
        max_attempts: 5
      labels:
        - "traefik.enable=true"
        - "traefik.http.routers.frontend.rule=Host(`game.homelab.living`)"
        - "traefik.http.routers.frontend.entrypoints=web"
        - "traefik.http.services.frontend.loadbalancer.server.port=80"
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://127.0.0.1/"]
      interval: 10s
      timeout: 3s
      start_period: 5s
      retries: 3

  # ---- PostgreSQL + TimescaleDB ----
  db:
    image: timescale/timescaledb:latest-pg16
    environment:
      POSTGRES_DB: homelab_game
      POSTGRES_USER: homelab_game
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - backend
    deploy:
      replicas: 1
      placement:
        constraints:
          - node.role == manager
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 5
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U homelab_game -d homelab_game"]
      interval: 10s
      timeout: 3s
      start_period: 30s
      retries: 5

  # ---- Redis (ephemeral cache) ----
  redis:
    image: redis:7-alpine
    command: >
      redis-server
      --maxmemory 128mb
      --maxmemory-policy allkeys-lru
      --save ""
      --appendonly no
    networks:
      - backend
    deploy:
      replicas: 1
      placement:
        constraints:
          - node.role == manager
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 5
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      start_period: 5s
      retries: 3

networks:
  backend:
    driver: overlay
  frontend:
    driver: overlay

volumes:
  pgdata:
    driver: local

