version: "3.8"

services:
  # ---- Database migrations (run-once) ----
  migrations:
    image: ghcr.io/monkay-homelab/homelab-game-migrations:latest
    environment:
      DB_HOST: db
      DB_PORT: "5432"
      DB_USER: homelab_game
      DB_PASSWORD: ${DB_PASSWORD}
      DB_NAME: homelab_game
    networks:
      - backend
    deploy:
      restart_policy:
        condition: on-failure
        max_attempts: 3
      replicas: 1

  # ---- Backend API ----
  backend:
    image: ghcr.io/monkay-homelab/homelab-game-backend:latest
    environment:
      PORT: "8080"
      ENV: production
      DB_HOST: db
      DB_PORT: "5432"
      DB_USER: homelab_game
      DB_PASSWORD: ${DB_PASSWORD}
      DB_NAME: homelab_game
      DB_SSLMODE: disable
      JWT_SECRET: ${JWT_SECRET}
    ports:
      - "8080:8080"
    networks:
      - backend
      - frontend
    deploy:
      replicas: 1
      update_config:
        parallelism: 1
        delay: 10s
        order: start-first
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 5
    healthcheck:
      test: ["CMD", "/healthcheck"]
      interval: 10s
      timeout: 3s
      start_period: 10s
      retries: 3

  # ---- Frontend (nginx) ----
  frontend:
    image: ghcr.io/monkay-homelab/homelab-game-frontend:latest
    ports:
      - "3000:80"
    networks:
      - frontend
    deploy:
      replicas: 1
      update_config:
        parallelism: 1
        delay: 10s
        order: start-first
      restart_policy:
        condition: any
        delay: 5s
        max_attempts: 5
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://127.0.0.1/"]
      interval: 10s
      timeout: 3s
      start_period: 5s
      retries: 3

  # ---- PostgreSQL + TimescaleDB ----
  db:
    image: timescale/timescaledb:latest-pg16
    environment:
      POSTGRES_DB: homelab_game
      POSTGRES_USER: homelab_game
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - backend
    deploy:
      replicas: 1
      placement:
        constraints:
          - node.role == manager
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 5
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U homelab_game -d homelab_game"]
      interval: 10s
      timeout: 3s
      start_period: 30s
      retries: 5

networks:
  backend:
    driver: overlay
  frontend:
    driver: overlay

volumes:
  pgdata:
    driver: local

