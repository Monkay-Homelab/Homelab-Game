apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "homelab-game.fullname" . }}-backend
  labels:
    {{- include "homelab-game.labels" . | nindent 4 }}
    {{- include "homelab-game.backend.selectorLabels" . | nindent 4 }}
spec:
  replicas: {{ .Values.backend.replicas }}
  selector:
    matchLabels:
      {{- include "homelab-game.backend.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "homelab-game.backend.selectorLabels" . | nindent 8 }}
    spec:
      initContainers:
        - name: migrate
          image: {{ .Values.migrations.image.repository }}:{{ .Values.migrations.image.tag | default .Chart.AppVersion }}
          imagePullPolicy: {{ .Values.migrations.image.pullPolicy | default "IfNotPresent" }}
          envFrom:
            - configMapRef:
                name: {{ include "homelab-game.fullname" . }}-config
            - secretRef:
                name: {{ include "homelab-game.fullname" . }}-secret
      containers:
        - name: backend
          image: {{ include "homelab-game.backendImage" . }}
          imagePullPolicy: {{ .Values.backend.image.pullPolicy }}
          ports:
            - containerPort: {{ .Values.backend.port }}
              protocol: TCP
          envFrom:
            - configMapRef:
                name: {{ include "homelab-game.fullname" . }}-config
            - secretRef:
                name: {{ include "homelab-game.fullname" . }}-secret
          livenessProbe:
            httpGet:
              path: /health
              port: {{ .Values.backend.port }}
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: {{ .Values.backend.port }}
            initialDelaySeconds: 3
            periodSeconds: 5
          resources:
            {{- toYaml .Values.backend.resources | nindent 12 }}
          lifecycle:
            preStop:
              exec:
                # Allow in-flight WebSocket connections to drain
                command: ["/bin/sh", "-c", "sleep 5"]
      terminationGracePeriodSeconds: 30
