name: Release

on:
  push:
    tags:
      - 'v*.*.*'

env:
  REGISTRY: ghcr.io

permissions:
  contents: write
  packages: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # ---- Backend gates ----
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: apps/backend/go.mod

      - name: Backend lint
        uses: golangci/golangci-lint-action@v7
        with:
          version: latest
          working-directory: apps/backend
          args: --timeout=5m

      - name: Backend test
        working-directory: apps/backend
        run: go test ./...

      # ---- Frontend gates ----
      - name: Set up pnpm
        uses: pnpm/action-setup@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install deps
        run: pnpm install --frozen-lockfile

      - name: Typecheck shared
        working-directory: packages/shared
        run: pnpm typecheck

      - name: Frontend lint
        working-directory: apps/desktop
        run: pnpm lint

      - name: Frontend format check
        working-directory: apps/desktop
        run: pnpm format:check

      - name: Frontend build
        working-directory: apps/desktop
        run: pnpm build

      # ---- Image build & push ----
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Backend meta
        id: meta-backend
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository_owner }}/homelab-game-backend
          tags: |
            type=semver,pattern=v{{version}}
            type=semver,pattern=v{{major}}.{{minor}}
            type=semver,pattern=v{{major}}
          flavor: latest=false

      - name: Build & push backend
        uses: docker/build-push-action@v6
        with:
          context: apps/backend
          push: true
          tags: ${{ steps.meta-backend.outputs.tags }}
          labels: ${{ steps.meta-backend.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Migrations meta
        id: meta-migrations
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository_owner }}/homelab-game-migrations
          tags: |
            type=semver,pattern=v{{version}}
            type=semver,pattern=v{{major}}.{{minor}}
            type=semver,pattern=v{{major}}
          flavor: latest=false

      - name: Build & push migrations
        uses: docker/build-push-action@v6
        with:
          context: apps/backend
          file: apps/backend/migrations.Dockerfile
          push: true
          tags: ${{ steps.meta-migrations.outputs.tags }}
          labels: ${{ steps.meta-migrations.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Frontend meta
        id: meta-frontend
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository_owner }}/homelab-game-frontend
          tags: |
            type=semver,pattern=v{{version}}
            type=semver,pattern=v{{major}}.{{minor}}
            type=semver,pattern=v{{major}}
          flavor: latest=false

      - name: Build & push frontend
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/desktop/Dockerfile
          push: true
          tags: ${{ steps.meta-frontend.outputs.tags }}
          labels: ${{ steps.meta-frontend.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # ---- Versioned deploy artifacts ----
      - name: Pin image tags in compose + stack
        run: |
          mkdir -p release-artifacts
          for f in docker-compose.yml docker-stack.yml; do
            sed -E "s|(homelab-game-[a-z]+):latest|\\1:${GITHUB_REF_NAME}|g" "$f" > "release-artifacts/$f"
          done
          cp .env.example release-artifacts/

      # ---- GitHub Release ----
      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            release-artifacts/docker-compose.yml
            release-artifacts/docker-stack.yml
            release-artifacts/.env.example
